<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Leave Requests</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body class="container mt-5">

<h2>Employee Leave Requests</h2>

<table class="table table-bordered">

    <tr>
        <th>Employee</th>
        <th>Leave Type</th>
        <th>Start</th>
        <th>End</th>
        <th>Reason</th>
        <th>Status</th>
        <th>Action</th>
    </tr>

    <tr th:each="leave : ${leaves}">

        <td th:text="${leave.employeeEmail}"></td>
        <td th:text="${leave.leaveType}"></td>
        <td th:text="${leave.startDate}"></td>
        <td th:text="${leave.endDate}"></td>
        <td th:text="${leave.reason}"></td>
        <td th:text="${leave.status}"></td>

        <td>
            <a th:href="@{/manager/approve/{id}(id=${leave.id})}"
               class="btn btn-success btn-sm">Approve</a>

            <a th:href="@{/manager/reject/{id}(id=${leave.id})}"
               class="btn btn-danger btn-sm">Reject</a>
        </td>

    </tr>

</table>

</body>
</html>
